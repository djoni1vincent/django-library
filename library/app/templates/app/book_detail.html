{% extends 'main.html' %}
{% load static %}
{% block content %}
    <div style="padding: 20px; display: grid; grid-template-columns: 1fr 5fr">
        <div class="image-book">
            <img style="height: 400px;" src="{{ book.image.url }}" alt="">
        </div>
        <div>
            <h1>{{ book.name }}</h1>
            {% for author in book.authors.all %}
                <span>{{ author }}</span>
            {% endfor %}
            <p>rating:</p>
            <p style="width: 600px;">{{ book.description }}</p>
            Genres:
            {% for genre in book.genres.all %}
                <span style="color: red;">{{ genre }}</span> |
            {% endfor %}
        </div>
    </img>
{% endblock content %}
