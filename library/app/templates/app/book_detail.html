{% extends 'main.html' %}
{% block content %}
    <div style="padding: 10px;">
        <div>
            <h1>{{ book.name }}</h1>
            {% for author in book.authors.all %}
                <span>{{ author }}</span>
            {% endfor %}
        </div>
        <p>rating:</p>
        <p style="width: 600px;">{{ book.description }}</p>
        Genres:
        {% for genre in book.genres.all %}
            <span style="color: red;">{{ genre }}</span> |
        {% endfor %}
    </div>
{% endblock content %}
