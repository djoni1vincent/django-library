{% extends "main.html" %}
{% block content %}
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <p class="card-text">Are you sure you want to delete this author?</p>
                    <form action="{% url 'book-list' %}" method="post">
                        {% csrf_token %}
                        <button class="btn btn-danger" type="submit">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
