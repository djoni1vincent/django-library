{% extends "main.html" %}
{% load static %}
{% block content %}
    <h1 class="mb-4">My library</h1>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for book in books %}
            <div class="col">
                <div class="card h-100 w-75">
                    <a href="{% url 'book-detail' book.id %}">
                        <img class="card-img-top"
                             style="height: 450px"
                             src="{{ book.image.url }}"
                             alt="">
                    </a>
                    <div class="card-body">
                        <h5 class="card-title">{{ book }}</h5>
                        {% for authors in book.authors.all %}
                            <small class="card-subtitle">{{ authors }}</small>
                        {% endfor %}
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock content %}
