{% extends "main.html" %}
{% block content %}
    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title mb-4">Create New Book</h2>
                    <form action="" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button class="btn btn-success" type="submit">Create New Book</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
